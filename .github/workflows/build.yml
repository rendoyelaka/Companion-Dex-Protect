name: Protect DEX and Rebuild APK

on:
  push:
    paths:
      - 'companion.apk'
    branches:
      - main

jobs:
  protect-dex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pycryptodome

      - name: Install tools (apktool, zipalign, apksigner, JDK)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y apktool zipalign apksigner openjdk-17-jdk

      - name: Extract and encrypt DEX
        env:
          DEX_KEY: ${{ secrets.DEX_ENCRYPTION_KEY }}
        run: python scripts/encrypt_dex.py

      - name: Decompile APK
        run: apktool d companion.apk -o apk_decompiled --no-src -f

      - name: Compile DexLoader into DEX
        run: |
          mkdir -p dexloader_classes
          javac -source 8 -target 8 \
            -cp $(find /usr/lib/jvm -name "android.jar" 2>/dev/null | head -1):. \
            android/DexLoader.java android/CompanionApp.java \
            -d dexloader_classes 2>/dev/null || true

          # Use d8 if available, else dx
          if command -v d8 &> /dev/null; then
            d8 --output dexloader_classes/ dexloader_classes/**/*.class
          else
            dx --dex --output=dexloader_classes/dexloader.dex dexloader_classes/
          fi

      - name: Merge DexLoader DEX into APK DEX
        run: |
          # Copy merged dex into decompiled APK
          cp dexloader_classes/dexloader.dex apk_decompiled/classes2.dex || true

      - name: Inject Application class into AndroidManifest
        run: |
          python3 scripts/patch_manifest.py apk_decompiled/AndroidManifest.xml

      - name: Repackage APK
        run: apktool b apk_decompiled -o companion-unsigned.apk

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias companionkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Companion, OU=App, O=Dev, L=City, S=State, C=US"

      - name: Zipalign APK
        run: zipalign -v 4 companion-unsigned.apk companion-aligned.apk

      - name: Sign APK
        run: |
          apksigner sign \
            --ks release.keystore \
            --ks-key-alias companionkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out companion-protected.apk \
            companion-aligned.apk

      - name: Get version tag
        id: version
        run: echo "tag=release-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Protected APK ${{ steps.version.outputs.tag }}
          files: |
            companion-protected.apk
            encrypted_classes.dex
          body: "Protected APK with encrypted DEX."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove companion.apk from repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git rm companion.apk
          git commit -m "chore: remove companion.apk after build [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
