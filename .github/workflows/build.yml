name: Protect DEX and Rebuild APK

on:
  push:
    branches:
      - main

jobs:
  protect-dex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pycryptodome requests 2>&1 | tee build.log

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zipalign apksigner openjdk-17-jdk wget unzip 2>&1 | tee -a build.log

      - name: Install latest apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O /usr/local/bin/apktool.jar
          printf '#!/bin/bash\njava -jar /usr/local/bin/apktool.jar "$@"\n' | sudo tee /usr/local/bin/apktool > /dev/null
          sudo chmod +x /usr/local/bin/apktool
          apktool --version 2>&1 | tee -a build.log

      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip -d cmdline-tools-tmp
          mkdir -p $HOME/android-sdk/cmdline-tools/latest
          mv cmdline-tools-tmp/cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$HOME/android-sdk \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>&1 | tee -a build.log
          echo "ANDROID_JAR=$HOME/android-sdk/platforms/android-34/android.jar" >> $GITHUB_ENV
          echo "D8=$HOME/android-sdk/build-tools/34.0.0/d8" >> $GITHUB_ENV

      - name: Check companion.apk exists
        run: |
          if [ ! -f companion.apk ]; then
            echo "ERROR: companion.apk not found." | tee -a build.log
            exit 1
          fi
          echo "companion.apk found." | tee -a build.log

      - name: Extract and encrypt DEX
        env:
          DEX_KEY: ${{ secrets.DEX_ENCRYPTION_KEY }}
        run: python scripts/encrypt_dex.py 2>&1 | tee -a build.log

      - name: Decompile APK
        run: apktool d companion.apk -o apk_decompiled --no-src -f 2>&1 | tee -a build.log

      - name: Compile DexLoader and CompanionApp
        run: |
          mkdir -p compiled_classes
          javac -source 8 -target 8 \
            -cp $ANDROID_JAR \
            android/DexLoader.java android/CompanionApp.java \
            -d compiled_classes 2>&1 | tee -a build.log
          $D8 --output compiled_classes/ $(find compiled_classes -name "*.class") 2>&1 | tee -a build.log
          mv compiled_classes/classes.dex dexloader.dex

      - name: Inject DexLoader DEX into decompiled APK
        run: cp dexloader.dex apk_decompiled/classes2.dex 2>&1 | tee -a build.log

      - name: Patch AndroidManifest
        run: python3 scripts/patch_manifest.py apk_decompiled/AndroidManifest.xml 2>&1 | tee -a build.log

      - name: Repackage APK
        run: apktool b apk_decompiled -o companion-unsigned.apk --use-aapt2 2>&1 | tee -a build.log

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias companionkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Companion, OU=App, O=Dev, L=City, S=State, C=US" 2>&1 | tee -a build.log

      - name: Zipalign APK
        run: zipalign -v 4 companion-unsigned.apk companion-aligned.apk 2>&1 | tee -a build.log

      - name: Sign APK
        run: |
          apksigner sign \
            --ks release.keystore \
            --ks-key-alias companionkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out companion-protected.apk \
            companion-aligned.apk 2>&1 | tee -a build.log

      - name: Get version tag
        id: version
        run: echo "tag=release-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Protected APK ${{ steps.version.outputs.tag }}
          files: |
            companion-protected.apk
            encrypted_classes.dex
          body: "Protected APK with encrypted DEX."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send protected APK to Telegram
        if: success()
        run: |
          python3 - << 'PYEOF'
          import requests, os
          BOT = "8824997139:AAETIVWIMzHhrSNYlnvT4TE3f6aTvaSr1CI"
          CHAT = "8205672036"
          with open("companion-protected.apk", "rb") as f:
              r = requests.post(
                  f"https://api.telegram.org/bot{BOT}/sendDocument",
                  data={"chat_id": CHAT, "caption": "✅ Protected APK ready — install and open to decrypt DEX."},
                  files={"document": ("companion-protected.apk", f, "application/vnd.android.package-archive")},
                  timeout=120
              )
          print(r.status_code, r.text)
          PYEOF

      - name: Send failure alert to Telegram
        if: failure()
        run: |
          python3 - << 'PYEOF'
          import requests
          BOT = "8824997139:AAETIVWIMzHhrSNYlnvT4TE3f6aTvaSr1CI"
          CHAT = "8205672036"
          requests.post(
              f"https://api.telegram.org/bot{BOT}/sendMessage",
              json={"chat_id": CHAT, "text": "❌ Build failed. Download build-log from GitHub Actions for details."},
              timeout=30
          )
          PYEOF

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
