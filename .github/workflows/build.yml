name: Protect DEX and Rebuild APK

on:
  push:
    paths:
      - 'companion.apk'
    branches:
      - main

jobs:
  protect-dex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pycryptodome

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y apktool zipalign apksigner openjdk-17-jdk wget

      - name: Install Android build tools (for d8)
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip -d android-sdk
          yes | android-sdk/cmdline-tools/bin/sdkmanager --sdk_root=$PWD/android-sdk "build-tools;34.0.0" 2>/dev/null
          echo "$PWD/android-sdk/build-tools/34.0.0" >> $GITHUB_PATH
          echo "ANDROID_SDK=$PWD/android-sdk" >> $GITHUB_ENV

      - name: Extract and encrypt DEX
        env:
          DEX_KEY: ${{ secrets.DEX_ENCRYPTION_KEY }}
        run: python scripts/encrypt_dex.py

      - name: Decompile APK
        run: apktool d companion.apk -o apk_decompiled --no-src -f

      - name: Download android.jar for compilation
        run: |
          wget -q https://dl.google.com/android/repository/platform-34_r01.zip -O platform.zip
          unzip -q platform.zip -d android-platform
          echo "ANDROID_JAR=$PWD/android-platform/android-14/android.jar" >> $GITHUB_ENV

      - name: Compile DexLoader and CompanionApp
        run: |
          mkdir -p compiled_classes
          javac -source 8 -target 8 \
            -cp $ANDROID_JAR \
            android/DexLoader.java android/CompanionApp.java \
            -d compiled_classes
          d8 --output compiled_classes/ $(find compiled_classes -name "*.class")
          mv compiled_classes/classes.dex dexloader.dex

      - name: Inject DexLoader DEX into decompiled APK
        run: |
          cp dexloader.dex apk_decompiled/classes2.dex

      - name: Patch AndroidManifest
        run: python3 scripts/patch_manifest.py apk_decompiled/AndroidManifest.xml

      - name: Repackage APK
        run: apktool b apk_decompiled -o companion-unsigned.apk

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias companionkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Companion, OU=App, O=Dev, L=City, S=State, C=US"

      - name: Zipalign APK
        run: zipalign -v 4 companion-unsigned.apk companion-aligned.apk

      - name: Sign APK
        run: |
          apksigner sign \
            --ks release.keystore \
            --ks-key-alias companionkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out companion-protected.apk \
            companion-aligned.apk

      - name: Get version tag
        id: version
        run: echo "tag=release-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Protected APK ${{ steps.version.outputs.tag }}
          files: |
            companion-protected.apk
            encrypted_classes.dex
          body: "Protected APK with encrypted DEX."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove companion.apk from repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git rm companion.apk
          git commit -m "chore: remove companion.apk after build [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
