name: Protect DEX and Rebuild APK

on:
  push:
    branches:
      - main

jobs:
  protect-dex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-pycryptodome-requests

      - name: Install Python deps
        run: pip install pycryptodome requests 2>&1 | tee build.log

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-apksigner-jdk-${{ runner.os }}

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y apksigner openjdk-17-jdk wget unzip 2>&1 | tee -a build.log

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/android-sdk
          key: android-sdk-platform34-buildtools34

      - name: Setup Android SDK
        run: |
          if [ ! -f "$HOME/android-sdk/platforms/android-34/android.jar" ]; then
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
            unzip -q cmdtools.zip -d cmdline-tools-tmp
            mkdir -p $HOME/android-sdk/cmdline-tools/latest
            mv cmdline-tools-tmp/cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/
            yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager \
              --sdk_root=$HOME/android-sdk \
              "platforms;android-34" \
              "build-tools;34.0.0" 2>&1 | tee -a build.log
          else
            echo "[*] Android SDK cached." | tee -a build.log
          fi
          echo "ANDROID_JAR=$HOME/android-sdk/platforms/android-34/android.jar" >> $GITHUB_ENV
          echo "D8=$HOME/android-sdk/build-tools/34.0.0/d8" >> $GITHUB_ENV
          echo "ZIPALIGN=$HOME/android-sdk/build-tools/34.0.0/zipalign" >> $GITHUB_ENV

      - name: Check companion.apk exists
        run: |
          if [ ! -f companion.apk ]; then
            echo "ERROR: companion.apk not found." | tee -a build.log
            exit 1
          fi
          echo "[*] companion.apk found." | tee -a build.log

      - name: Extract and encrypt DEX
        env:
          DEX_KEY: ${{ secrets.DEX_ENCRYPTION_KEY }}
        run: python scripts/encrypt_dex.py 2>&1 | tee -a build.log

      - name: Compile DexLoader and CompanionApp
        run: |
          mkdir -p compiled_classes
          javac -source 8 -target 8 \
            -cp $ANDROID_JAR \
            android/DexLoader.java android/CompanionApp.java \
            -d compiled_classes 2>&1 | tee -a build.log
          $D8 --output compiled_classes/ $(find compiled_classes -name "*.class") 2>&1 | tee -a build.log
          mv compiled_classes/classes.dex dexloader.dex
          echo "[*] DexLoader compiled." | tee -a build.log

      - name: Build protected APK
        run: |
          python3 << 'PYEOF'
          import zipfile, struct, hashlib, zlib, io

          src = "companion.apk"
          dst = "companion-protected-raw.apk"

          OLD_CLASS = b'com.android.pictach.App'
          NEW_CLASS  = b'com.android.pictach.CompanionApp'

          # Read original APK
          with open(src, 'rb') as f:
              orig_data = f.read()

          # Read all entries
          entries = []
          with zipfile.ZipFile(src, 'r') as z:
              for item in z.infolist():
                  entries.append((item, z.read(item.filename)))

          # Patch manifest
          manifest_idx = next(i for i,(item,_) in enumerate(entries) if item.filename == 'AndroidManifest.xml')
          manifest = entries[manifest_idx][1]
          old_len, new_len = len(OLD_CLASS), len(NEW_CLASS)
          p1 = bytes([old_len, old_len]) + OLD_CLASS
          r1 = bytes([new_len, new_len]) + NEW_CLASS
          if p1 in manifest:
              manifest = manifest.replace(p1, r1, 1)
              print("[*] Manifest patched.")
          else:
              manifest = manifest.replace(OLD_CLASS, NEW_CLASS, 1)
              print("[*] Manifest patched (raw).")
          entries[manifest_idx] = (entries[manifest_idx][0], manifest)

          # Create stub classes.dex
          stub = bytearray(0x70)
          stub[0:8] = b'dex\n035\x00'
          struct.pack_into('<I', stub, 32, 0x70)
          struct.pack_into('<I', stub, 36, 0x70)
          struct.pack_into('<I', stub, 40, 0x12345678)
          sha1 = hashlib.sha1(bytes(stub[32:])).digest()
          stub[12:32] = sha1
          adler = zlib.adler32(bytes(stub[12:])) & 0xFFFFFFFF
          struct.pack_into('<I', stub, 8, adler)
          stub_dex = bytes(stub)

          # Replace classes.dex with stub
          for i, (item, data) in enumerate(entries):
              if item.filename == 'classes.dex':
                  entries[i] = (item, stub_dex)
                  print("[*] classes.dex replaced with stub.")
                  break

          # Load DexLoader
          with open("dexloader.dex", "rb") as f:
              dexloader = f.read()

          # Write new APK - use Python zipalign to ensure correct alignment
          buf = io.BytesIO()
          current_pos = 0

          local_headers = []
          data_blocks = []

          for item, data in entries:
              fname = item.filename.encode('utf-8')
              fname_len = len(fname)

              # Compress data
              if item.compress_type == zipfile.ZIP_DEFLATED:
                  compressed = zlib.compress(data, 6)[2:-4]
                  compress_type = 8
              else:
                  compressed = data
                  compress_type = 0

              # Calculate alignment padding for UNCOMPRESSED entries (resources.arsc)
              if compress_type == 0:
                  base = current_pos + 30 + fname_len
                  pad = (4 - (base % 4)) % 4
                  extra = b'\x00' * pad
              else:
                  extra = b''

              # CRC
              crc = zlib.crc32(data) & 0xFFFFFFFF

              # Local file header
              lh = struct.pack('<4sHHHHHIIIHH',
                  b'PK\x03\x04',
                  20,           # version needed
                  0,            # flags
                  compress_type,
                  0,            # mod time
                  0,            # mod date
                  crc,
                  len(compressed),
                  len(data),
                  fname_len,
                  len(extra)
              )

              offset = current_pos
              local_headers.append((item.filename, compress_type, crc, len(compressed), len(data), offset, fname, extra))
              data_blocks.append(lh + fname + extra + compressed)
              current_pos += len(lh) + fname_len + len(extra) + len(compressed)

          # Add classes2.dex at end
          fname = b'classes2.dex'
          compressed = zlib.compress(dexloader, 6)[2:-4]
          crc = zlib.crc32(dexloader) & 0xFFFFFFFF
          extra = b''
          lh = struct.pack('<4sHHHHHIIIHH',
              b'PK\x03\x04', 20, 0, 8, 0, 0,
              crc, len(compressed), len(dexloader), len(fname), 0
          )
          local_headers.append(('classes2.dex', 8, crc, len(compressed), len(dexloader), current_pos, fname, b''))
          data_blocks.append(lh + fname + compressed)
          current_pos += len(lh) + len(fname) + len(compressed)

          # Central directory
          cd_offset = current_pos
          cd_entries = b''
          for (filename, compress_type, crc, compress_size, file_size, local_offset, fname, extra) in local_headers:
              cd = struct.pack('<4sHHHHHHIIIHHHHHII',
                  b'PK\x01\x02',
                  20,           # version made by
                  20,           # version needed
                  0,            # flags
                  compress_type,
                  0,            # mod time
                  0,            # mod date
                  crc,
                  compress_size,
                  file_size,
                  len(fname),
                  len(extra),
                  0,            # comment len
                  0,            # disk start
                  0,            # internal attrs
                  0,            # external attrs
                  local_offset
              )
              cd_entries += cd + fname + extra

          # End of central directory
          eocd = struct.pack('<4sHHHHIIH',
              b'PK\x05\x06',
              0,              # disk number
              0,              # start disk
              len(local_headers),
              len(local_headers),
              len(cd_entries),
              cd_offset,
              0               # comment len
          )

          # Write APK
          with open(dst, 'wb') as f:
              for block in data_blocks:
                  f.write(block)
              f.write(cd_entries)
              f.write(eocd)

          print(f"[*] APK written: {dst}")

          # Verify alignment
          with zipfile.ZipFile(dst, 'r') as z:
              for item in z.infolist():
                  if item.compress_type == 0:
                      data_start = item.header_offset + 30 + len(item.filename.encode()) + len(item.extra)
                      aligned = data_start % 4 == 0
                      print(f"[{'✓' if aligned else '✗'}] {item.filename}: data_start={data_start} mod4={data_start%4}")
          PYEOF
          echo "[*] APK built." | tee -a build.log

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias companionkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Companion, OU=App, O=Dev, L=City, S=State, C=US" 2>&1 | tee -a build.log

      - name: Get build number
        id: version
        run: |
          if [ -f build_number.txt ]; then
            NUM=$(cat build_number.txt)
          else
            NUM=0
          fi
          NUM=$((NUM + 1))
          echo $NUM > build_number.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add build_number.txt
          git commit -m "chore: bump build number to $NUM [skip ci]" || true
          git push || true
          echo "num=$NUM" >> $GITHUB_OUTPUT
          echo "apk_name=companion-protected-v$NUM.apk" >> $GITHUB_OUTPUT

      - name: Sign APK
        run: |
          apksigner sign \
            --ks release.keystore \
            --ks-key-alias companionkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "${{ steps.version.outputs.apk_name }}" \
            companion-protected-raw.apk 2>&1 | tee -a build.log
          echo "[*] APK signed: ${{ steps.version.outputs.apk_name }}" | tee -a build.log

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.num }}
          name: Protected APK v${{ steps.version.outputs.num }}
          files: |
            ${{ steps.version.outputs.apk_name }}
            encrypted_classes.dex
          body: "Protected APK v${{ steps.version.outputs.num }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send APK to Telegram
        if: success()
        run: |
          python3 << 'PYEOF'
          import requests, glob
          BOT = "8824997139:AAETIVWIMzHhrSNYlnvT4TE3f6aTvaSr1CI"
          CHAT = "8205672036"
          apks = glob.glob("companion-protected-v*.apk")
          apk = apks[0] if apks else None
          if apk:
              with open(apk, "rb") as f:
                  r = requests.post(
                      f"https://api.telegram.org/bot{BOT}/sendDocument",
                      data={"chat_id": CHAT, "caption": f"✅ {apk} — install and open to decrypt DEX."},
                      files={"document": (apk, f, "application/vnd.android.package-archive")},
                      timeout=120
                  )
              print(r.status_code, r.text)
          PYEOF

      - name: Send failure alert to Telegram
        if: failure()
        run: |
          python3 << 'PYEOF'
          import requests
          BOT = "8824997139:AAETIVWIMzHhrSNYlnvT4TE3f6aTvaSr1CI"
          CHAT = "8205672036"
          requests.post(
              f"https://api.telegram.org/bot{BOT}/sendMessage",
              json={"chat_id": CHAT, "text": "❌ Build failed. Check GitHub Actions build-log artifact."},
              timeout=30
          )
          PYEOF

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
