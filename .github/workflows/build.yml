name: Encrypt DEX and Upload to Release

on:
  push:
    paths:
      - 'companion.apk'
    branches:
      - main

jobs:
  encrypt-dex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pycryptodome

      - name: Extract and encrypt DEX
        id: encrypt
        env:
          DEX_KEY: ${{ secrets.DEX_ENCRYPTION_KEY }}
        run: |
          python scripts/encrypt_dex.py 2>&1 | tee build.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "ENCRYPT_FAILED=true" >> $GITHUB_ENV
            exit 1
          fi

      - name: Upload error log on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: build-error-log
          path: build.log
          retention-days: 7

      - name: Get version tag
        if: success()
        id: version
        run: echo "tag=release-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload encrypted DEX
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Encrypted DEX ${{ steps.version.outputs.tag }}
          files: encrypted_classes.dex
          body: "Auto-generated encrypted DEX."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove companion.apk from repo after encryption
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git rm companion.apk
          git commit -m "chore: remove companion.apk after encryption [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
