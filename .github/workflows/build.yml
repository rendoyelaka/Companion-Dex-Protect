name: Protect DEX and Rebuild APK

on:
  push:
    branches:
      - main

jobs:
  protect-dex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-pycryptodome-requests

      - name: Install Python deps
        run: pip install pycryptodome requests 2>&1 | tee build.log

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-apksigner-jdk-${{ runner.os }}

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y apksigner openjdk-17-jdk wget unzip 2>&1 | tee -a build.log

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/android-sdk
          key: android-sdk-platform34-buildtools34

      - name: Setup Android SDK
        run: |
          if [ ! -f "$HOME/android-sdk/platforms/android-34/android.jar" ]; then
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
            unzip -q cmdtools.zip -d cmdline-tools-tmp
            mkdir -p $HOME/android-sdk/cmdline-tools/latest
            mv cmdline-tools-tmp/cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/
            yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager \
              --sdk_root=$HOME/android-sdk \
              "platforms;android-34" \
              "build-tools;34.0.0" 2>&1 | tee -a build.log
          else
            echo "[*] Android SDK cached." | tee -a build.log
          fi
          echo "ANDROID_JAR=$HOME/android-sdk/platforms/android-34/android.jar" >> $GITHUB_ENV
          echo "D8=$HOME/android-sdk/build-tools/34.0.0/d8" >> $GITHUB_ENV
          echo "ZIPALIGN=$HOME/android-sdk/build-tools/34.0.0/zipalign" >> $GITHUB_ENV

      - name: Check companion.apk exists
        run: |
          if [ ! -f companion.apk ]; then
            echo "ERROR: companion.apk not found." | tee -a build.log
            exit 1
          fi
          echo "[*] companion.apk found." | tee -a build.log

      - name: Extract and encrypt DEX
        env:
          DEX_KEY: ${{ secrets.DEX_ENCRYPTION_KEY }}
        run: python scripts/encrypt_dex.py 2>&1 | tee -a build.log

      - name: Compile DexLoader and CompanionApp
        run: |
          mkdir -p compiled_classes

          # FIX 1: Use --release instead of deprecated -source/-target flags
          # FIX 2: Add -encoding UTF-8 to avoid platform charset warnings
          javac --release 8 \
            -encoding UTF-8 \
            -cp $ANDROID_JAR \
            android/DexLoader.java android/CompanionApp.java \
            -d compiled_classes 2>&1 | tee -a build.log

          # FIX 3: D8 needs --lib to resolve Android classes, and --release for R8 compat
          $D8 \
            --release \
            --lib $ANDROID_JAR \
            --output compiled_classes/ \
            $(find compiled_classes -name "*.class") 2>&1 | tee -a build.log

          mv compiled_classes/classes.dex dexloader.dex
          echo "[*] DexLoader compiled successfully." | tee -a build.log

      - name: Patch manifest and inject DexLoader into APK
        run: |
          # FIX 4: Use the fixed patch script which properly rebuilds the binary XML string pool
          cp companion.apk companion-protected-raw.apk
          python scripts/patch_apk_manifest.py companion-protected-raw.apk 2>&1 | tee -a build.log

          # Now inject dexloader.dex as classes2.dex and stub out classes.dex
          python3 << 'PYEOF'
          import zipfile, struct, hashlib, zlib, io, os

          src = "companion-protected-raw.apk"
          tmp = "companion-injected.apk"

          # Minimal valid stub DEX (empty, no classes)
          stub = bytearray(0x70)
          stub[0:8] = b'dex\n035\x00'
          struct.pack_into('<I', stub, 32, 0x70)   # header size
          struct.pack_into('<I', stub, 36, 0x70)   # file size
          struct.pack_into('<I', stub, 40, 0x12345678)
          sha1 = hashlib.sha1(bytes(stub[32:])).digest()
          stub[12:32] = sha1
          adler = zlib.adler32(bytes(stub[12:])) & 0xFFFFFFFF
          struct.pack_into('<I', stub, 8, adler)
          stub_dex = bytes(stub)

          with open("dexloader.dex", "rb") as f:
              dexloader = f.read()

          with zipfile.ZipFile(src, 'r') as src_zip:
              with zipfile.ZipFile(tmp, 'w', zipfile.ZIP_DEFLATED) as dst_zip:
                  for item in src_zip.infolist():
                      if item.filename == 'classes.dex':
                          # Replace real DEX with empty stub
                          dst_zip.writestr(item, stub_dex)
                          print("[*] classes.dex replaced with stub.")
                      else:
                          dst_zip.writestr(item, src_zip.read(item.filename))
                  # Inject DexLoader as classes2.dex
                  dst_zip.writestr('classes2.dex', dexloader)
                  print("[*] classes2.dex (DexLoader) injected.")

          os.replace(tmp, src)
          print(f"[*] APK ready: {src}")
          PYEOF
          echo "[*] APK build complete." | tee -a build.log

      - name: Zipalign APK
        run: |
          $ZIPALIGN -v -p 4 companion-protected-raw.apk companion-protected-aligned.apk 2>&1 | tee -a build.log
          echo "[*] APK aligned." | tee -a build.log

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias companionkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Companion, OU=App, O=Dev, L=City, S=State, C=US" 2>&1 | tee -a build.log

      - name: Get build number
        id: version
        run: |
          if [ -f build_number.txt ]; then
            NUM=$(cat build_number.txt)
          else
            NUM=0
          fi
          NUM=$((NUM + 1))
          echo $NUM > build_number.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add build_number.txt
          git commit -m "chore: bump build number to $NUM [skip ci]" || true
          git push || true
          echo "num=$NUM" >> $GITHUB_OUTPUT
          echo "apk_name=companion-protected-v$NUM.apk" >> $GITHUB_OUTPUT

      - name: Sign APK
        run: |
          apksigner sign \
            --ks release.keystore \
            --ks-key-alias companionkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "${{ steps.version.outputs.apk_name }}" \
            companion-protected-aligned.apk 2>&1 | tee -a build.log
          echo "[*] APK signed: ${{ steps.version.outputs.apk_name }}" | tee -a build.log

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.num }}
          name: Protected APK v${{ steps.version.outputs.num }}
          files: |
            ${{ steps.version.outputs.apk_name }}
            encrypted_classes.dex
          body: "Protected APK v${{ steps.version.outputs.num }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send APK to Telegram
        if: success()
        run: |
          python3 << 'PYEOF'
          import requests, glob
          BOT  = "8824997139:AAETIVWIMzHhrSNYlnvT4TE3f6aTvaSr1CI"
          CHAT = "8205672036"
          apks = glob.glob("companion-protected-v*.apk")
          apk  = apks[0] if apks else None
          if apk:
              with open(apk, "rb") as f:
                  r = requests.post(
                      f"https://api.telegram.org/bot{BOT}/sendDocument",
                      data={"chat_id": CHAT, "caption": f"✅ {apk} — install and open to decrypt DEX."},
                      files={"document": (apk, f, "application/vnd.android.package-archive")},
                      timeout=120
                  )
              print(r.status_code, r.text)
          PYEOF

      - name: Send failure alert to Telegram
        if: failure()
        run: |
          python3 << 'PYEOF'
          import requests
          BOT  = "8824997139:AAETIVWIMzHhrSNYlnvT4TE3f6aTvaSr1CI"
          CHAT = "8205672036"
          requests.post(
              f"https://api.telegram.org/bot{BOT}/sendMessage",
              json={"chat_id": CHAT, "text": "❌ Build failed. Check GitHub Actions build-log artifact."},
              timeout=30
          )
          PYEOF

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
